name: 10 MLOps CI CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  run-mlops-lifecycle:
    runs-on: ubuntu-latest
    env:
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      BENTOML_HOME: ${{ github.workspace }}/MLOPS/07_model_serving/.bentoml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training and tracking pipeline
        run: python MLOPS/03_orchestration/03_prefect_mlops_pipeline.py

      - name: Export BentoML model
        run: python MLOPS/07_model_serving/07_export_bentoml_model.py

      - name: Run monitoring checks
        run: python MLOPS/08_monitoring/08_run_monitoring_checks.py

      - name: Run retraining decision
        run: python MLOPS/09_retraining_trigger/09_decide_retraining.py

      - name: Upload generated lifecycle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlops-lifecycle-artifacts
          path: |
            MLOPS/06_model_artifacts
            MLOPS/08_monitoring
            MLOPS/09_retraining_trigger

  smoke-test-bentoml-service:
    runs-on: ubuntu-latest
    needs: run-mlops-lifecycle
    env:
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      BENTOML_HOME: ${{ github.workspace }}/MLOPS/07_model_serving/.bentoml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build artifacts required for serving
        run: |
          python MLOPS/03_orchestration/03_prefect_mlops_pipeline.py
          python MLOPS/07_model_serving/07_export_bentoml_model.py

      - name: Start BentoML service
        run: |
          bentoml serve MLOPS/07_model_serving/07_bentoml_service.py:FraudDetectionService --port 3001 > bentoml.log 2>&1 &
          sleep 20

      - name: Check service endpoints
        run: |
          curl --fail http://127.0.0.1:3001/readyz
          curl --fail http://127.0.0.1:3001/docs.json

      - name: Smoke test predict endpoint
        run: |
          python - <<'PY'
          import json
          import pandas as pd
          import requests

          row = pd.read_csv("MLOPS/01_data_versioning/01_creditcard_dataset.csv").rename(columns=str.lower).iloc[0]
          payload = {
              "records": [
                  {**{f"v{i}": float(row[f"v{i}"]) for i in range(1, 29)}, "amount": float(row["amount"])}
              ]
          }
          response = requests.post("http://127.0.0.1:3001/predict", json=payload, timeout=30)
          response.raise_for_status()
          data = response.json()
          assert data, "Prediction response is empty"
          print(json.dumps(data))
          PY

      - name: Show BentoML logs on failure
        if: failure()
        run: cat bentoml.log
